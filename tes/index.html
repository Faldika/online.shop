<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Detail</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="product-detail">

  <!-- LEFT -->
  <div class="product-left">

    <button class="arrow left">&#10094;</button>

    <div class="main-image">
      <img id="mainImg" src="1.jpeg">
    </div>

    <button class="arrow right">&#10095;</button>

    <!-- THUMB -->
    <div class="thumbnail">
      <img src="1.jpeg" onclick="changeImg(this)">
      <img src="2.jpeg" onclick="changeImg(this)">
      <img src="3.jpeg" onclick="changeImg(this)">
    </div>

  </div>

  <!-- RIGHT -->
  <div class="product-right">

    <h3>Size</h3>

    <div class="size">
      <button onclick="selectSize(this)">S</button>
      <button onclick="selectSize(this)">M</button>
      <button onclick="selectSize(this)">L</button>
      <button onclick="selectSize(this)">XL</button>
    </div>

    <!-- CART -->
    <div class="cart">

      <div class="qty">
        <button onclick="minus()">-</button>
        <span id="qty">1</span>
        <button onclick="plus()">+</button>
      </div>

      <button class="add-cart" onclick="addCart()">Add to cart</button>

    </div>

    <button class="buy" onclick="buyNow()">Buy it now</button>

    <a href="#" class="size-chart" onclick="sizeChart()">Size Chart</a>

    <div class="desc">
      <p><b>DESCRIPTION PRODUCT</b></p>
      <p>CUTTING : Oversize</p>
      <p>MATERIAL : Cotton combed 20S</p>
      <p>Color : White</p>
    </div>

  </div>

</div>

<script src="script.js">


// GANTI GAMBAR
function changeImg(el) {
  document.getElementById("mainImg").src = el.src;
}

// SIZE ACTIVE
function selectSize(btn) {
  document.querySelectorAll(".size button").forEach(b => {
    b.classList.remove("active");
  });
  btn.classList.add("active");
}

// QTY
let qty = 1;

function plus() {
  qty++;
  document.getElementById("qty").innerText = qty;
}

function minus() {
  if (qty > 1) {
    qty--;
    document.getElementById("qty").innerText = qty;
  }
}

// ADD CART
function addCart() {
  alert("Produk ditambahkan ke cart!");
}

// BUY NOW
function buyNow() {
  alert("Lanjut ke pembayaran!");
}

// SIZE CHART
function sizeChart() {
  alert("Menampilkan size chart...");
}


</script>

</body>
</html>
